name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing or new semantic version tag, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Verify tests
        run: |
          npm test
          cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build and attach release assets
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          releaseName: Personal Growth RPG Notebook ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          releaseBody: |
            Automated GitHub release generated by GitHub Actions.

            Included assets:
            - NSIS Windows installer
            - MSI Windows installer
          releaseDraft: false
          prerelease: false
